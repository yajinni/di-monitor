<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DI Monitor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div class="header">
      <div style="display: flex; align-items: baseline; gap: 8px;">
        <h1>DI Monitor</h1>
        <span id="appVersion" style="font-size: 10px; color: #666;">v0.0.0</span>
      </div>
      <div style="display: flex; align-items: center; gap: 12px;">
        <div class="header-actions" style="display: flex; gap: 8px;">
          <button id="sendAttendanceBtn" class="primary-btn" style="padding: 6px 12px; font-size: 11px;">Send On Time Data</button>
          <button id="sendLootBtn" class="primary-btn" style="padding: 6px 12px; font-size: 11px;">Send Loot Data</button>
        </div>
        <div class="connection-status" id="connectionStatus">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Not configured</span>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="status">Status</button>
      <button class="tab" data-tab="settings">Settings</button>
    </div>

    <div class="tab-content active" id="tab-status">
      <div class="log-container">
        <table class="log-table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Event</th>
              <th>Details</th>
            </tr>
          </thead>
          <tbody id="logBody"></tbody>
        </table>
      </div>
    </div>

    <div class="tab-content" id="tab-settings">
      <div class="settings-form">

        <div class="section-label">Site Connection</div>

        <div class="setting-group">
          <label>Site URL</label>
          <input type="text" id="siteUrl" placeholder="e.g. https://your-loot-manager.pages.dev">
          <div class="field-hint">The URL of the site to fetch PR values from.</div>
        </div>

        <div class="setting-group">
          <label>Poll Interval (seconds)</label>
          <input type="number" id="pollInterval" min="5" max="300" step="5">
          <div class="field-hint">How often to check for PR changes (5–300 seconds).</div>
        </div>

        <div class="section-label">WoW Addon</div>

        <div class="setting-group">
          <label>World of Warcraft Folder</label>
          <div class="file-picker">
            <input type="text" id="wowPath" readonly placeholder="Select your WoW installation folder...">
            <button id="browseWowBtn">Browse</button>
          </div>
          <div id="wowPathError" class="field-error"></div>
          <div id="addonStatus" class="addon-status"></div>
        </div>

        <div class="setting-group" id="accountGroup" style="display: none; margin-top: 20px;">
          <label>WoW Account</label>
          <select id="wowAccount" style="width: 100%; padding: 8px; background: #0f3460; color: white; border: 1px solid #16213e; border-radius: 4px;">
            <option value="">-- Select Account --</option>
          </select>
          <div class="field-hint">Select the account folder to automatically find your data files.</div>
        </div>

        <div id="manualFilesSection" style="margin-top: 10px;">
          <div class="setting-group" style="margin-top: 20px; opacity: 0.7;">
            <label>RCLootCouncil SavedVariables File (Auto-found)</label>
            <div class="file-picker">
              <input type="text" id="rclPath" readonly placeholder="Will be found automatically...">
              <button id="browseRclBtn" style="font-size: 11px;">Manual Override</button>
            </div>
            <div id="rclPathError" class="field-error"></div>
          </div>

          <div class="setting-group" style="margin-top: 20px; opacity: 0.7;">
            <label>DI Attendance SavedVariables File (Auto-found)</label>
            <div class="file-picker">
              <input type="text" id="attendancePath" readonly placeholder="Will be found automatically...">
              <button id="browseAttendanceBtn" style="font-size: 11px;">Manual Override</button>
            </div>
            <div id="attendancePathError" class="field-error"></div>
          </div>
        </div>

        <div class="section-label">General</div>

        <div class="setting-group">
          <label class="checkbox-label">
            <input type="checkbox" id="runOnStartup">
            Run on Windows startup
          </label>
        </div>

        <div class="setting-group" style="margin-top: 20px;">
          <label>Logs</label>
          <button id="openLogsBtn" class="secondary-btn">Open Logs Folder</button>
        </div>

        <button id="saveBtn" class="save-btn">Save Settings</button>
        <div id="saveMessage" class="save-message"></div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
